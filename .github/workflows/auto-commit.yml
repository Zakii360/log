name: Auto Commit

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make a change
        run: |
          echo "Update $(date)" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "Zakii360"
          git config user.email "zakip201367@gmail.com"
          git add log.txt
          git commit -m "auto update" || exit 0
          git push
